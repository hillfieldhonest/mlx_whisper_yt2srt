name: Bug report
description: Report a reproducible problem with yt2srt.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: yt2srt version
      description: Output of `uv run yt2srt --version`.
      placeholder: "yt2srt 0.1.0"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: macOS version, Apple silicon model, and Python version.
      placeholder: "macOS 15.x, Apple M-series, Python 3.12"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command
      description: The command you ran. Remove private URLs or tokens.
      render: shell
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Error output
      description: Paste the relevant error output.
      render: text
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I used a YouTube URL.
        - label: `ffmpeg` is available on `PATH`.
        - label: I am using macOS on Apple silicon.
